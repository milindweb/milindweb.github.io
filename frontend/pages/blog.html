<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/shared/js/config.js"></script>
  <script>const PAGE_CONFIG = { title: 'Blog', description: 'Explore engineering projects, tutorials, tips, finance, education, and more. MilindWeb Blog with categories, tags, and latest posts.', canonical: '/blog' };</script>
  <script src="/shared/js/seo-injector.js"></script>

  <link rel="icon" type="image/png" href="/shared/assets/img/favicon.png">
  <!-- Global CSS -->
  <link rel="stylesheet" href="/shared/css/style.css" />
  <link rel="stylesheet" href="/shared/css/headerfooter.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Blog CSS -->


  <!-- JS -->
  <script src="/shared/js/headerfooter.js" defer></script>
</head>
<body>

  <!-- Global Header -->
  <div id="header"></div>

  <!-- =====================
       Blog Content
  ====================== -->
  <main class="bg-container">
    <h1 class="bg-title">Our Blog</h1>
    <p class="bg-subtitle">Latest articles, tutorials, projects, and tips.</p>

    <!-- Blog Layout: Posts + Sidebar -->
    <div class="bg-layout">

      <!-- Blog Posts Section -->
      <section id="bg-posts" class="bg-grid fade-in">
        <!-- blog.js will inject posts here -->
      </section>

      <!-- Sidebar -->
      <aside class="bg-sidebar">

        <!-- Search -->
        <div class="bg-widget">
          <h3><i class="fa fa-search"></i> Search</h3>
          <input type="text" id="bg-search" placeholder="Search posts...">
        </div>

        <!-- Categories -->
        <div class="bg-widget">
          <h3><i class="fa fa-folder-open"></i> Categories</h3>
          <ul id="bg-categories"></ul>
        </div>

        <!-- Tags -->
        <div class="bg-widget">
          <h3><i class="fa fa-tags"></i> Tags</h3>
          <div id="bg-tags"></div>
        </div>

        <!-- Recent Posts -->
        <div class="bg-widget">
          <h3><i class="fa fa-clock"></i> Recent Posts</h3>
          <ul id="bg-recent"></ul>
        </div>

      </aside>
    </div>

    <!-- Pagination -->
    <div class="bg-pagination" id="bg-pagination"></div>
  </main>

  <!-- Global Footer -->
  <div id="footer"></div>

</body>
</html>
