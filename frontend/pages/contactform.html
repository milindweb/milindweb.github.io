<div class="contact-form-wrapper">
  <form id="contactForm">
    <div class="form-row">
      <select id="service" name="service" required>
        <option value="">Select Service</option>
        <option>SEO & Digital Marketing</option>
        <option>Web Designing</option>
        <option>Software Solutions</option>
        <option>Graphics Designing</option>
        <option>Projects & Workshop</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-row">
      <input type="text" id="name" name="name" placeholder="Your Name" required>
    </div>
    <div class="form-row">
      <input type="email" id="email" name="email" placeholder="Your Email" required>
    </div>
    <div class="form-row">
      <input type="tel" id="phone" name="phone" pattern="^[6-9][0-9]{9}$" placeholder="Mobile No." required>
    </div>
    <div id="phoneError" class="error-msg">Please enter a valid 10-digit Indian mobile number starting with 6-9.</div>
    <div class="form-row">
      <textarea id="message" name="message" maxlength="500" placeholder="Your Message" required></textarea>
    </div>
    <button type="submit" class="form-submit-btn">Submit <i class="fas fa-arrow-right"></i></button>
  </form>
  <div id="response"></div>
</div>
