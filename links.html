<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MilindWeb - Useful Links</title>

<!-- Fonts & Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Header + Footer -->
<link rel="stylesheet" href="css/headerfooter.css">
<script src="js/headerfooter.js" defer></script>

<style>
:root {
  --white:#ffffff;
  --text-primary:#222;
  --text-secondary:#555;
  --primary-color:#3498db;
  --border-light:#e5e7eb;
  --border-radius:12px;
  --shadow-md:0 2px 6px rgba(0,0,0,0.08);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.15);
  --transition:0.3s ease;
}

body {
  font-family:"Poppins",sans-serif;
  background:#f5f7fa;
  margin:0;
  padding:0;
  color:var(--text-primary);
}

.main-content {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:2rem 1rem;
}

h2 {
  margin:1.5rem 0 1rem;
  color:var(--primary-color);
  text-align:left;
  width:100%;
  max-width:1100px;
}

/* SEARCH */
.search-box {
  width:100%;
  max-width:1100px;
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  background:var(--white);
  border-radius:var(--border-radius);
  border:1px solid var(--border-light);
  padding:0.6rem 1rem;
  box-shadow:var(--shadow-md);
}

.search-box i {
  color:var(--primary-color);
  margin-right:0.5rem;
}

.search-box input {
  border:none;
  outline:none;
  width:100%;
  font-size:0.95rem;
  font-family:"Poppins",sans-serif;
}

.container {
  width:100%;
  max-width:1100px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:1.2rem;
}

.card {
  background:var(--white);
  border-radius:var(--border-radius);
  border:1px solid var(--border-light);
  box-shadow:var(--shadow-md);
  padding:1rem 1.2rem;
  transition:var(--transition);
  display:flex;
  flex-direction:column;
}

.card:hover {
  transform:translateY(-3px);
  box-shadow:var(--shadow-lg);
}

.card-header {
  display:flex;
  align-items:center;
  gap:0.75rem;
  font-size:1rem;
  font-weight:600;
  color:var(--primary-color);
  margin-bottom:0.4rem;
}

.card-header i {
  font-size:1.2rem;
  min-width:24px;
  text-align:center;
}

.card-header a {
  text-decoration:none;
  color:var(--primary-color);
  transition:color var(--transition);
}

.card-header a:hover {
  color:#2a7fc7;
  text-decoration:underline;
}

.card p {
  font-size:0.88rem;
  color:var(--text-secondary);
  margin:0;
  line-height:1.4;
}

.loading,
.error {
  margin-top:2rem;
  font-size:1rem;
  color:var(--text-secondary);
}
</style>
</head>

<body>

<div id="header"></div>

<main class="main-content">

<h2>📁 Useful Links</h2>

<div class="search-box">
  <i class="fas fa-search"></i>
  <input type="text" id="searchInput" placeholder="Search tools, AI, games, utilities...">
</div>

<div id="links-container" class="container"></div>

<div id="statusMessage" class="loading">Loading data...</div>

</main>

<div id="footer"></div>

<script>
let linksData = [];
const container = document.getElementById("links-container");
const statusMessage = document.getElementById("statusMessage");

/* =============================
   FETCH JSON DATA
============================= */
async function loadData() {
  try {
    const response = await fetch("data/links.json");

    if (!response.ok) {
      throw new Error("Failed to load JSON");
    }

    linksData = await response.json();
    statusMessage.style.display = "none";
    renderLinks();

  } catch (error) {
    statusMessage.className = "error";
    statusMessage.textContent = "❌ Error loading data. Check JSON path.";
    console.error(error);
  }
}

/* =============================
   RENDER FUNCTION
============================= */
function renderLinks(filterText = "") {
  container.innerHTML = "";
  const search = filterText.toLowerCase();

  linksData.forEach(section => {

    let categoryHasVisibleItems = false;
    const sectionElements = [];

    section.items.forEach(item => {

      if (
        item.title.toLowerCase().includes(search) ||
        item.desc.toLowerCase().includes(search)
      ) {
        categoryHasVisibleItems = true;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="card-header">
            <i class="${item.icon}"></i>
            <a href="${item.link}" target="_blank">${item.title}</a>
          </div>
          <p>${item.desc}</p>
        `;

        sectionElements.push(card);
      }

    });

    if (categoryHasVisibleItems) {
      const heading = document.createElement("h2");
      heading.textContent = section.category;
      heading.style.gridColumn = "1/-1";
      container.appendChild(heading);

      sectionElements.forEach(el => container.appendChild(el));
    }

  });
}

/* =============================
   SEARCH EVENT
============================= */
document.getElementById("searchInput").addEventListener("input", function () {
  renderLinks(this.value);
});

/* =============================
   INIT
============================= */
loadData();
</script>

</body>
</html>
