<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milindweb - OPD Registration Form</title>

<!-- Header + Footer CSS -->
<link rel="stylesheet" href="css/headerfooter.css">

<!-- Font Awesome (for footer icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- JS to load header/footer -->
<script src="js/headerfooter.js" defer></script>

<style>


/* ============================================================
   THEME VARIABLES (LIGHT + DARK)
   ============================================================ */
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface-alt: #f6f8fb;
  --text: #1e293b;
  --label: #1f2937;
  --heading: #2563eb;
  --input-border: #d1d5db;
  --input-focus: #2563eb;
  --btn: #2563eb;
  --radius: 4px;
  --transition: 0.25s ease;
}

/* Dark mode */
body.alt {
  --bg: #0f172a;
  --surface: #0b1220;
  --surface-alt: #111827;
  --text: #e5e7eb;
  --label: #cbd5f5;
  --heading: #60a5fa;
  --input-border: #334155;
  --input-focus: #60a5fa;
  --btn: #3b82f6;
}

/* ============================================================
   PAGE BASE
   ============================================================ */
.opd-page {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 18px;
  animation: fadeIn 0.4s ease;
}

.opd-page h2 {
  text-align: center;
  font-size: 20px;
  color: var(--heading);
  margin-bottom: 14px;
  font-weight: 600;
}

/* ============================================================
   FORM CONTAINER (FLAT – GOVT STYLE)
   ============================================================ */
.opd-page form {
  max-width: 950px;
  margin: auto;
  background: var(--surface);
  padding: 18px;
  border-radius: var(--radius);
  border: 1px solid #e5e7eb;
  animation: slideUp 0.35s ease;
}

/* ============================================================
   ROW SYSTEM (REGISTER STYLE)
   ============================================================ */
.opd-page .row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 10px 12px;
  margin-bottom: 6px;
  border-radius: 3px;
  transition: background var(--transition);
}

.opd-page .row:nth-child(odd) {
  background: var(--surface);
}

.opd-page .row:nth-child(even) {
  background: var(--surface-alt);
}

.opd-page .row:hover {
  background: rgba(37,99,235,0.04);
}

/* ============================================================
   FIELD
   ============================================================ */
.opd-page .field {
  flex: 1 1 260px;
  min-width: 0;
  animation: fadeIn 0.4s ease;
}

/* Desktop layout */
@media (min-width: 992px) {
  .row-1 .field { flex: 0 0 48%; }
  .row-2 .field,
  .row-3 .field,
  .row-5 .field,
  .row-6 .field,
  .row-7 .field,
  .row-8 .field { flex: 0 0 32%; }
  .row-4 .field { flex: 0 0 24%; }
}

/* Tablet */
@media (max-width: 991px) {
  .opd-page .field {
    flex: 1 1 48%;
  }
}

/* Mobile */
@media (max-width: 599px) {
  .opd-page form {
    padding: 12px;
  }

  .opd-page .row {
    padding: 8px;
    gap: 8px;
  }

  .opd-page .field {
    flex: 1 1 100%;
  }

  .opd-page h2 {
    font-size: 17px;
  }
}

/* ============================================================
   LABELS
   ============================================================ */
.opd-page label {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  margin-bottom: 3px;
  color: var(--label);
}

.opd-page small {
  font-size: 11px;
  color: #64748b;
}

/* ============================================================
   INPUTS – TEXT-LIKE (REGISTER FEEL)
   ============================================================ */
.opd-page input,
.opd-page select,
.opd-page textarea {
  width: 100%;
  padding: 6px 8px;
  font-size: 13px;
  border-radius: 3px;
  border: 1px solid var(--input-border);
  background: transparent;
  color: var(--text);
  transition: border var(--transition), box-shadow var(--transition);
}

.opd-page textarea {
  resize: vertical;
  min-height: 38px;
}

.opd-page input:focus,
.opd-page select:focus,
.opd-page textarea:focus {
  border-color: var(--input-focus);
  box-shadow: inset 0 0 0 1px var(--input-focus);
  outline: none;
}

/* ============================================================
   AUTOCOMPLETE DROPDOWNS
   ============================================================ */
#medicineSuggestions,
#symptomSuggestions {
  position: absolute;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--input-border);
  border-radius: 4px;
  max-height: 180px;
  overflow-y: auto;
  z-index: 1000;
  animation: fadeIn 0.2s ease;
}

#medicineSuggestions div,
#symptomSuggestions div {
  padding: 7px 9px;
  font-size: 13px;
  cursor: pointer;
}

#medicineSuggestions div:hover,
#symptomSuggestions div:hover {
  background: rgba(37,99,235,0.08);
}

/* ============================================================
   BUTTON
   ============================================================ */
.opd-page button {
  display: block;
  margin: 18px auto 6px;
  padding: 10px 26px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 5px;
  border: none;
  background: var(--btn);
  color: #fff;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.opd-page button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.opd-page button:active {
  transform: scale(0.98);
}

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>


   
</head>

<body>

<!-- Header Placeholder -->
<div id="header"></div>

<!-- OPD Form Content -->
<main class="opd-page">

  <h2>OPD Patient Registration Form</h2>

  <form id="patientForm">

    <!-- Row 1 -->
    <div class="row row-1">
      <div class="field"><label>OPD No</label><input name="opdNo" id="opdNo" readonly placeholder="Auto-generated"></div>
      <div class="field"><label>Mobile No</label><input name="mobileNo" type="number"></div>
    </div>

    <!-- Row 2 -->
    <div class="row row-2">
      <div class="field"><label>Patient Name</label><input name="patientName" required></div>
      <div class="field"><label>Gender</label>
        <select name="gender" required>
          <option value="">Select</option>
          <option>Male</option><option>Female</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Age</label><input name="age" type="number" required></div>
    </div>

    <!-- Row 3 -->
    <div class="row row-3">
      <div class="field"><label>Doctor Name</label>
        <select name="doctorName" required>
          <option value="">Select Doctor</option>
          <option>Dr. Girkar</option>
          <option>Dr. Nerekar</option>
          <option>Dr. Sathe</option>
          <option>Dr. Hajari</option>
          <option>Dr. Gargi Hospital</option>
          <option>Dr. INHS Sandhani - Gyne</option>
          <option>Dr. INHS Sandhani - General</option>
          <option>Dr. Terna Hospital</option>
          <option>Dr. JJ Hospital</option>
          <option>Dr. KEM Hospital</option>
        </select>
      </div>
     
      <div class="field">
        <label>Department</label>
        <select name="department" id="departmentSelect" required>
          <option value="">Select Department</option>
          <!-- Departments will be loaded from data/dept.json via JS -->
        </select>
      </div>

<div class="field">
  <label>Chief Complaints<small>write symptom + duration</small></label>
  <textarea name="symptoms" id="symptomsInput"></textarea>
   <div id="symptomSuggestions"></div>
   <div id="symptomReference"></div>
  <!-- Symptoms will be handled via JSON + JS (multi-select, autocomplete, manual entry) -->
</div>

    <!-- Row 4 -->
    <div class="row row-4">
      <div class="field"><label>Weight <small>50–80 kg</small></label><input name="weight" type="number"></div>
      <div class="field"><label>BP <small>120/80 mmHg</small></label><input name="bp" type=""></div>
      <div class="field"><label>Pulse <small>60–100 bpm</small></label><input name="pulse" type=""></div>
      <div class="field"><label>RR <small>12–20/min</small></label><input name="respiratoryRate" type="number"></div>
    </div>

    <!-- Row 5 -->
    <div class="row row-5">
      <div class="field"><label>spO₂ <small>≥95%</small></label><input name="spO2" type="number"></div>
      <div class="field"><label>Temp <small>98.6°F</small></label><input name="temp" type="number"></div>
      <div class="field"><label>Sugar <small>70–110 mg/dL</small></label><input name="sugar" type="number"></div>
    </div>
<div class="field"><label>Provisional Diagnosis<small>Based on symptoms + vitals only</small></label><textarea name="treatmentNote"></textarea></div>


    <!-- Row 6 -->
    <div class="row row-6">
      <div class="field"><label>Investigations Advised</label><textarea name="testDetails"></textarea></div>
      <div class="field"><label>Investigation Reports</label><textarea name="testReports"></textarea></div>
      <div class="field"><label>Final Diagnosis</label><textarea name="diagnosis"></textarea></div>
    </div>

    <!-- Row 7 -->
    <div class="row row-7">
      <div class="field">
        <label>Prescription (Generic API/ Brand)<small>i.e. Tab Paracetamol 500 mg BD × 3 days 2T</small></label><textarea name="prescription" id="prescriptionInput"></textarea>
        <div id="medicineSuggestions"></div>
      </div>
      
      <div class="field"><label>Advice</label><textarea name="advice"></textarea></div>
    </div>

    <!-- Row 8 -->
    <div class="row row-8">
      <div class="field">
        <label>Effect After Treatment</label>
        <select name="effectAfterTreatment">
          <option value="">NA</option>
          <option>Recovered</option>
          <option>No Change</option>
          <option>Worsened</option>
          <option>Follow-up Required</option>
        </select>
      </div>
      <div class="field"><label>Dr. Fees</label><input name="drFees" type="number"></div>
      <div class="field"><label>Dr. Remarks</label><textarea name="drRemarks"></textarea></div>
    </div>

    <button type="submit">Submit</button>
    <div id="response"></div>

  </form>
</main>

<!-- Footer Placeholder -->
<div id="footer"></div>

<!-- JS Form Submission -->
<script src="js/patientform.js"></script>

</body>
</html>
