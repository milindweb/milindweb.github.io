<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>MilindWeb – OPD Registration Form</title>

<!-- Header + Footer CSS -->
<link rel="stylesheet" href="css/headerfooter.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<script src="js/headerfooter.js" defer></script>

<style>
/* ==================== FORM PAGE LIGHT THEME ==================== */
.opd-page {
  font-family: 'Segoe UI', sans-serif;
  background: #f8fafc;
  color: #1e293b;
  margin: 0;
  padding: 20px;
}

/* ---------- Section Boxes ---------- */
.opd-section {
  background: #ffffff;
  padding: 18px 22px;
  margin: 18px auto;
  border-radius: 12px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.07);
  max-width: 950px;
}

.opd-section h3 {
  margin: 0 0 14px;
  font-size: 18px;
  font-weight: 700;
  color: #1d4ed8;
  border-left: 4px solid #2563eb;
  padding-left: 10px;
}

/* ---------- Rows ---------- */
.row {
  display: flex;
  flex-wrap: wrap;   /* Soft wrap instead of breaking outside */
  gap: 14px;
  margin-bottom: 12px;
}

/* ---------- Fields ---------- */
.field {
  flex: 1;
  min-width: 180px;
}

label {
  display: block;
  font-size: 13.5px;
  font-weight: 600;
  margin-bottom: 5px;
  color: #1d4ed8;
}

small {
  font-weight: 400;
  font-size: 11px;
  color: #64748b;
}

input,
select,
textarea {
  width: 100%;
  padding: 8px 10px;
  background: #f9fafb;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 13.5px;
  transition: all 0.25s ease;
}

input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: #3b82f6;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

textarea {
  resize: vertical;
  min-height: 40px;
}

/* ---------- Submit Button ---------- */
button {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: 8px;
  cursor: pointer;
  display: block;
  margin: 25px auto;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(37,99,235,0.2);
}

button:hover {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  box-shadow: 0 6px 16px rgba(37,99,235,0.25);
  transform: translateY(-1px);
}

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .opd-section {
    margin: 12px 10px;
    padding: 16px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<main class="opd-page">
  <h2 style="text-align:center;color:#2563eb;margin-bottom:20px;font-size:24px;">OPD Patient Registration Form</h2>

  <!-- ================= SECTION 1 : BASIC INFO ================= -->
  <div class="opd-section">
    <h3>Basic Information</h3>
    <div class="row">
      <div class="field"><label>OPD No</label><input name="opdNo" id="opdNo" readonly placeholder="Auto-generated"></div>
      <div class="field"><label>Mobile No</label><input name="mobileNo" type="number"></div>
      <div class="field"><label>Patient Name</label><input name="patientName" required></div>
      <div class="field"><label>Gender</label>
        <select name="gender" required>
          <option value="">Select</option>
          <option>Male</option><option>Female</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Age</label><input name="age" type="number" required></div>
    </div>
  </div>

  <!-- =============== SECTION 2 : DOCTOR DETAILS ================= -->
  <div class="opd-section">
    <h3>Doctor & Department</h3>
    <div class="row">
      <div class="field">
        <label>Doctor Name</label>
        <select name="doctorName" required>
          <option value="">Select Doctor</option>
          <option>Dr. Girkar</option>
          <option>Dr. Nerekar</option>
          <option>Dr. INHS Sandhani - Gyne</option>
          <option>Dr. INHS Sandhani - General</option>
          <option>Dr. Terna</option>
        </select>
      </div>
      <div class="field">
        <label>Department</label>
        <select name="department" required>
          <option value="">Select Department</option>
          <option>General Medicine</option>
          <option>General Surgery</option>
          <option>Cardiology</option>
          <option>Dental</option>
          <option>Dermatology</option>
        </select>
      </div>
      <div class="field">
        <label>Symptoms</label>
        <textarea name="symptoms"></textarea>
      </div>
    </div>
  </div>

  <!-- =============== SECTION 3 : VITALS ================= -->
  <div class="opd-section">
    <h3>Vitals</h3>
    <div class="row">
      <div class="field"><label>Weight <small>50–80 kg</small></label><input name="weight" type="number"></div>
      <div class="field"><label>BP <small>120/80</small></label><input name="bp" type="number"></div>
      <div class="field"><label>Pulse <small>60–100 bpm</small></label><input name="pulse" type="number"></div>
      <div class="field"><label>RR <small>12–20</small></label><input name="respiratoryRate" type="number"></div>
      <div class="field"><label>spO₂ <small>≥95%</small></label><input name="spO2" type="number"></div>
      <div class="field"><label>Temp <small>98.6°F</small></label><input name="temp" type="number"></div>
      <div class="field"><label>Sugar <small>70–110 mg/dL</small></label><input name="sugar" type="number"></div>
    </div>
  </div>

  <!-- =============== SECTION 4 : TESTS ================= -->
  <div class="opd-section">
    <h3>Tests & Diagnosis</h3>
    <div class="row">
      <div class="field"><label>Test Details</label><textarea name="testDetails"></textarea></div>
      <div class="field"><label>Test Reports</label><textarea name="testReports"></textarea></div>
      <div class="field"><label>Diagnosis</label><textarea name="diagnosis"></textarea></div>
    </div>
  </div>

  <!-- =============== SECTION 5 : PRESCRIPTION ================= -->
  <div class="opd-section">
    <h3>Prescription / Treatment</h3>
    <div class="row">
      <div class="field"><label>Prescription</label><textarea name="prescription"></textarea></div>
      <div class="field"><label>Treatment Note</label><textarea name="treatmentNote"></textarea></div>
    </div>
  </div>

  <!-- =============== SECTION 6 : SUMMARY ================= -->
  <div class="opd-section">
    <h3>Follow-up & Fees</h3>
    <div class="row">
      <div class="field"><label>Advice</label><textarea name="advice"></textarea></div>
      <div class="field">
        <label>Effect After Treatment</label>
        <select name="effectAfterTreatment">
          <option value="">NA</option>
          <option>Recovered</option>
          <option>No Change</option>
          <option>Worsened</option>
          <option>Follow-up Required</option>
        </select>
      </div>
      <div class="field"><label>Dr. Fees</label><input name="drFees" type="number"></div>
    </div>
  </div>

  <!-- =============== SECTION 7 : REMARKS ================= -->
  <div class="opd-section">
    <h3>Doctor Remarks</h3>
    <div class="row">
      <div class="field"><textarea name="drRemarks"></textarea></div>
    </div>
  </div>

  <button type="submit">Submit</button>
</main>

<!-- FOOTER -->
<div id="footer"></div>

<script src="js/patientform.js"></script>

</body>
</html>
