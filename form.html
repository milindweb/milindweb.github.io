<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milindweb - OPD Registration Form</title>

<!-- Header + Footer CSS -->
<link rel="stylesheet" href="css/headerfooter.css">

<!-- Font Awesome (for footer icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- JS to load header/footer -->
<script src="js/headerfooter.js" defer></script>

<style>
/* ============================================================
   THEME VARIABLES (LIGHT + OPTION FOR ALTERNATE PALETTE)
   ============================================================ */
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #1e293b;
  --label: #1d4ed8;
  --heading: #2563eb;
  --input-bg: #f9fafb;
  --input-border: #d1d5db;
  --input-focus: #3b82f6;
  --button-start: #3b82f6;
  --button-end: #2563eb;
  --highlight: #0ea5a4; /* Your alternate selected color */
}

/* Optional alternate palette: add class="alt" on <body> */
body.alt {
  --bg: #0f172a;
  --surface: #0b1220;
  --text: #e2e8f0;
  --label: #93c5fd;
  --heading: #60a5fa;
  --input-bg: #1e293b;
  --input-border: #334155;
  --input-focus: #60a5fa;
  --button-start: #60a5fa;
  --button-end: #3b82f6;
  --highlight: #ff7a59;
}

/* ============================================================
   PAGE BASE
   ============================================================ */
.opd-page {
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  margin: 0;
  flex: 1;
}

.opd-page h2 {
  text-align: center;
  color: var(--heading);
  margin: 25px 0 15px;
  font-size: 24px;
  font-weight: 650;
}

/* ============================================================
   FORM CONTAINER
   ============================================================ */
.opd-page form {
  max-width: 950px;
  margin: 25px auto 40px;
  background: var(--surface);
  padding: 28px;
  border-radius: 14px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.06);
  transition: 0.3s ease;
}

.opd-page form:hover {
  box-shadow: 0 8px 28px rgba(37,99,235,0.10);
  transform: translateY(-1px);
}

/* ============================================================
   ROW SYSTEM – FLEXIBLE, NO OVERFLOW, FULL SCREEN FIT
   ============================================================ */
.opd-page .row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 14px;
  width: 100%;
}

.opd-page .field {
  flex: 1 1 260px;
  min-width: 0; /* MOST IMPORTANT: prevents overflow */
}

/* DESKTOP ROW WIDTHS */
@media (min-width: 992px) {
  .row.row-1 .field { flex: 0 0 calc(50% - 14px); }
  .row.row-2 .field { flex: 0 0 calc(33.33% - 14px); }
  .row.row-3 .field { flex: 0 0 calc(33.33% - 14px); }
  .row.row-4 .field { flex: 0 0 calc(25% - 14px); }
  .row.row-5 .field { flex: 0 0 calc(33.33% - 14px); }
  .row.row-6 .field { flex: 0 0 calc(33.33% - 14px); }
  .row.row-7 .field { flex: 0 0 calc(33.33% - 14px); }
  .row.row-8 .field { flex: 0 0 calc(33.33% - 14px); }
}

/* TABLET */
@media (max-width: 991px) and (min-width: 600px) {
  .opd-page .field {
    flex: 1 1 calc(50% - 14px);
  }
}

/* MOBILE — FULL WIDTH ALWAYS */
@media (max-width: 599px) {

  .opd-page form {
    padding: 14px !important;
    margin: 10px !important;
    width: 100% !important;
  }

  .opd-page h2 {
    font-size: 18px;
    margin: 10px 0 15px;
  }

  .opd-page .field {
    flex: 1 1 100% !important;
    min-width: 100% !important;
  }

  .opd-page .row {
    gap: 8px !important;
    margin-bottom: 10px !important;
  }

  .opd-page input,
  .opd-page select,
  .opd-page textarea {
    padding: 6px 8px !important;
    font-size: 13px !important;
  }

  .opd-page button {
    width: 100% !important;
    padding: 11px !important;
    font-size: 14px !important;
    margin-top: 15px !important;
  }
}

/* ============================================================
   LABELS & HELP TEXT
   ============================================================ */
.opd-page label {
  display: block;
  font-size: 13.5px;
  font-weight: 600;
  margin-bottom: 5px;
  color: var(--label);
}

.opd-page small {
  font-size: 11px;
  color: #64748b;
}

/* ============================================================
   INPUT, SELECT, TEXTAREA
   ============================================================ */
.opd-page input,
.opd-page select,
.opd-page textarea {
  width: 100%;
  padding: 8px 10px;
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--input-border);
  border-radius: 6px;
  font-size: 13.5px;
  transition: 0.25s ease;
  min-width: 0; /* FIX overflow */
}

.opd-page input:focus,
.opd-page select:focus,
.opd-page textarea:focus {
  border-color: var(--input-focus);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  outline: none;
}

.opd-page textarea {
  resize: vertical;
  min-height: 40px;
}

/* ============================================================
   SUBMIT BUTTON
   ============================================================ */
.opd-page button {
  background: linear-gradient(135deg, var(--button-start), var(--button-end));
  color: #fff;
  border: none;
  padding: 12px 28px;
  border-radius: 8px;
  cursor: pointer;
  display: block;
  margin: 25px auto 5px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: 0.3s ease;
  box-shadow: 0 4px 12px rgba(37,99,235,0.2);
}

.opd-page button:hover {
  background: linear-gradient(135deg, var(--button-end), var(--button-start));
  box-shadow: 0 6px 16px rgba(37,99,235,0.28);
  transform: translateY(-1px);
}


</style>
</head>

<body>

<!-- Header Placeholder -->
<div id="header"></div>

<!-- OPD Form Content -->
<main class="opd-page">

  <h2>OPD Patient Registration Form</h2>

  <form id="patientForm">

    <!-- Row 1 -->
    <div class="row row-1">
      <div class="field"><label>OPD No</label><input name="opdNo" id="opdNo" readonly placeholder="Auto-generated"></div>
      <div class="field"><label>Mobile No</label><input name="mobileNo" type="number"></div>
    </div>

    <!-- Row 2 -->
    <div class="row row-2">
      <div class="field"><label>Patient Name</label><input name="patientName" required></div>
      <div class="field"><label>Gender</label>
        <select name="gender" required>
          <option value="">Select</option>
          <option>Male</option><option>Female</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Age</label><input name="age" type="number" required></div>
    </div>

    <!-- Row 3 -->
    <div class="row row-3">
      <div class="field"><label>Doctor Name</label>
        <select name="doctorName" required>
          <option value="">Select Doctor</option>
          <option>Dr. Girkar</option>
          <option>Dr. Nerekar</option>
          <option>Dr. INHS Sandhani - Gyne</option>
          <option>Dr. INHS Sandhani - General</option>
          <option>Dr. Terna</option>
        </select>
      </div>
      <div class="field"><label>Department</label>
        <select name="department" required>
          <option value="">Select Department</option>
          <option>General Medicine / Physician</option>
          <option>General Surgery</option>
          <option>Cardiology (Heart Specialist)</option>
          <option>Dental / Oral Surgery</option>
          <option>Dermatology (Skin & Hair)</option>
          <option>Endocrinology (Diabetes / Thyroid)</option>
          <option>ENT (Ear, Nose, Throat)</option>
          <option>Gastroenterology (Digestive System)</option>
          <option>Nephrology (Kidney)</option>
          <option>Neurology (Brain & Nerves)</option>
          <option>Obstetrics & Gynecology (Gynac)</option>
          <option>Oncology (Cancer)</option>
          <option>Ophthalmology (Eye)</option>
          <option>Orthopedics</option>
          <option>Pediatrics (Child Specialist)</option>
          <option>Physiotherapy / Rehabilitation</option>
          <option>Plastic & Reconstructive Surgery</option>
          <option>Psychiatry (Mental Health)</option>
          <option>Pulmonology / Chest Medicine</option>
          <option>Radiology & Imaging</option>
          <option>Urology (Urinary / Male Reproductive)</option>
          <option>Others / Not Listed</option>
        </select>
      </div>
      <div class="field"><label>Symptoms</label><textarea name="symptoms"></textarea></div>
    </div>

    <!-- Row 4 -->
    <div class="row row-4">
      <div class="field"><label>Weight <small>50–80 kg</small></label><input name="weight" type="number"></div>
      <div class="field"><label>BP <small>120/80 mmHg</small></label><input name="bp" type="number"></div>
      <div class="field"><label>Pulse <small>60–100 bpm</small></label><input name="pulse" type="number"></div>
      <div class="field"><label>RR <small>12–20/min</small></label><input name="respiratoryRate" type="number"></div>
    </div>

    <!-- Row 5 -->
    <div class="row row-5">
      <div class="field"><label>spO₂ <small>≥95%</small></label><input name="spO2" type="number"></div>
      <div class="field"><label>Temp <small>98.6°F / 37°C</small></label><input name="temp" type="number"></div>
      <div class="field"><label>Sugar <small>70–110 mg/dL</small></label><input name="sugar" type="number"></div>
    </div>

    <!-- Row 6 -->
    <div class="row row-6">
      <div class="field"><label>Test Details</label><textarea name="testDetails"></textarea></div>
      <div class="field"><label>Test Reports</label><textarea name="testReports"></textarea></div>
      <div class="field"><label>Diagnosis</label><textarea name="diagnosis"></textarea></div>
    </div>

    <!-- Row 7 -->
    <div class="row row-7">
      <div class="field"><label>Prescription (Generic / Brand)</label><textarea name="prescription"></textarea></div>
      <div class="field"><label>Treatment Note</label><textarea name="treatmentNote"></textarea></div>
      <div class="field"><label>Advice</label><textarea name="advice"></textarea></div>
    </div>

    <!-- Row 8 -->
    <div class="row row-8">
      <div class="field">
        <label>Effect After Treatment</label>
        <select name="effectAfterTreatment">
          <option value="">NA</option>
          <option>Recovered</option>
          <option>No Change</option>
          <option>Worsened</option>
          <option>Follow-up Required</option>
        </select>
      </div>
      <div class="field"><label>Dr. Fees</label><input name="drFees" type="number"></div>
      <div class="field"><label>Dr. Remarks</label><textarea name="drRemarks"></textarea></div>
    </div>

    <button type="submit">Submit</button>
    <div id="response"></div>

  </form>
</main>

<!-- Footer Placeholder -->
<div id="footer"></div>

<!-- JS Form Submission -->
<script src="js/patientform.js"></script>

</body>
</html>
