<!-- PREMIUM CONTACT FORM (NEW DESIGN) -->
<!-- ================================ -->
<div class="contact-form-wrapper">

  <h2> Contact Us</h2>

  <form id="contactForm">

    <!-- Service -->
    <div class="form-row">
      <label for="service">Service</label>
      <select id="service" name="service" required>
        <option value="">Select Service</option>
        <option>SEO & Digital Marketing</option>
        <option>Web Designing</option>
        <option>Software Solutions</option>
        <option>Graphics Designing</option>
        <option>Projects & Workshop</option>
        <option>Other</option>
      </select>
    </div>

    <!-- Name -->
    <div class="form-row">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>

    <!-- Email -->
    <div class="form-row">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>

    <!-- Phone -->
    <div class="form-row">
      <label for="phone">Mobile No.</label>
      <input type="tel" id="phone" name="phone" pattern="^[6-9][0-9]{9}$" required>
    </div>

    <div id="phoneError" class="error-msg">
      Please enter a valid 10-digit Indian mobile number starting with 6-9.
    </div>

    <!-- Message -->
    <div class="form-row">
      <label for="message">Message</label>
      <textarea id="message" name="message" maxlength="500" required></textarea>
    </div>

    <!-- SUBMIT BUTTON -->
    <button type="submit" class="form-submit-btn">Submit</button>

  </form>

  <!-- Response Message -->
  <div id="response"></div>

</div>

/* PREMIUM CONTACT FORM UI (LATEST) */
<!-- ================================ -->

 <style>

/* ===== PREMIUM LIGHT BLUE THEME ===== */

:root {
  --card-bg: #ffffff;
  --secondary-bg: #f1f6ff;

  --accent: #2563eb;

  --transition: all 0.3s ease;
}

.contact-form-wrapper {

  width: 100%;
  max-width: 650px;
  margin: 2rem auto;
  border: 1px solid var(--border);
  transition: var(--transition);
}

/* TITLE */
.contact-form-wrapper h2 {
  text-align: center;
  margin-bottom: 1.5rem;
  font-size: 1.7rem;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* FORM ROW */
.form-row {
  display: flex;
  flex-direction: column;
  margin-bottom: 1.3rem;
}

/* LABEL */
.contact-form-wrapper label {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-primary);
}

/* INPUTS */
.contact-form-wrapper input,
.contact-form-wrapper select,
.contact-form-wrapper textarea {
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--secondary-bg);
  color: var(--text-primary);
  font-size: 1rem;
  transition: var(--transition);
}

/* FOCUS EFFECT */
.contact-form-wrapper input:focus,
.contact-form-wrapper select:focus,
.contact-form-wrapper textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  background: #ffffff;
  outline: none;
}

/* TEXTAREA */
.contact-form-wrapper textarea {
  min-height: 110px;
  resize: vertical;
}

/* SUBMIT BUTTON */
.form-submit-btn {
  width: 100%;
  padding: 13px;
  font-size: 1.05rem;
  background: var(--gradient);
  color: #ffffff;
  border: none;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
}

.form-submit-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35);
}

/* ERROR MESSAGE */
.error-msg {
  color: #dc2626;
  font-size: 0.85rem;
  margin-top: 5px;
  display: none;
}

/* ALERT BOX */
.contact-form-wrapper .alert {
  margin-top: 1rem;
  padding: 0.9rem;
  border-radius: 12px;
  text-align: center;
  font-weight: 600;
}

.contact-form-wrapper .success {
  background: #e0fdf4;
  color: #059669;
  border: 1px solid #34d399;
}

.contact-form-wrapper .error {
  background: #fee2e2;
  color: #dc2626;
  border: 1px solid #f87171;

/* MOBILE */
@media (max-width: 480px) {
  .contact-form-wrapper {
    padding: 1.4rem;

  .contact-form-wrapper h2 {
    font-size: 1.5rem;
  }
}

</style>
