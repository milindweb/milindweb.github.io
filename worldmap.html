<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive World Map</title>
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Custom CSS (Header + Footer) -->
    <style>
        /* Reset for Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Header and Footer Styling */
        #header, #footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Map Styling */
        #map {
            height: 500px; /* Ensure the map container has a height */
            width: 70%;
            background-color: #ddd;
            margin: 20px auto;
        }

        /* Details Panel (Country Info and Geopolitical News) */
        .details-panel {
            width: 28%;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            float: right;
            margin-top: 20px;
        }

        /* Tabs for content switching */
        .tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .tab-button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            flex-grow: 1;
        }

        .tab-button.active {
            background-color: #2980b9;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            #map {
                width: 100%;
                height: 300px;
            }

            .details-panel {
                width: 100%;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- Header Section -->
    <div id="header">
        <h1>Interactive World Map</h1>
        <p>Click on any country to get its details and geopolitical news</p>
    </div>

    <!-- Main Content (World Map + Details Panel) -->
    <div id="world-map-container" style="display: flex; justify-content: space-between; padding: 20px;">
        <div id="map"></div> <!-- The World Map will be here -->
        <div class="details-panel">
            <div class="tabs">
                <button class="tab-button active" onclick="showTab(1)">Country Details</button>
                <button class="tab-button" onclick="showTab(2)">Geopolitical News</button>
            </div>
            <div id="tab-1" class="tab-content active">
                <h3>Country Details</h3>
                <div id="country-info"></div>
            </div>
            <div id="tab-2" class="tab-content">
                <h3>Geopolitical News</h3>
                <div id="geopolitical-news"></div>
            </div>
        </div>
    </div>

    <!-- Footer Section -->
    <div id="footer">
        <p>&copy; 2026 Your Company. All Rights Reserved.</p>
    </div>

    <!-- JavaScript Section -->
    <script>
        // API Key for NewsData.io (Geopolitical News)
        const apiKey = 'pub_3b990e7259074b468f98db7edec68e8f'; // Replace with your actual API key

        // Function to Initialize Leaflet.js Map
        function initMap() {
            // Initialize the map centered at [20, 0] (near the center of the world map)
            const map = L.map('map').setView([20, 0], 2); // Zoom level 2

            // Add OpenStreetMap tiles to the map
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Event: When the user clicks on a country, fetch its details and geopolitical news
            map.on('click', function(e) {
                // Get the latitude and longitude of the clicked point
                const countryName = getCountryByCoords(e.latlng.lat, e.latlng.lng); // Implement this to map coords to country name

                // Fetch country details and geopolitical news for the clicked country
                fetchCountryDetails(countryName);
                fetchGeopoliticalNews(countryName);
            });
        }

        // Dummy function for converting coordinates to country name
        // In a real implementation, you'd use a reverse geocoding service to map coordinates to a country
        function getCountryByCoords(lat, lng) {
            return "India"; // For demo purposes, always return India (replace this logic for actual mapping)
        }

        // Function to Fetch Country Details using Restcountries API
        function fetchCountryDetails(countryName) {
            fetch(`https://restcountries.com/v3.1/name/${countryName}`)
                .then(response => response.json())
                .then(data => {
                    const country = data[0];
                    const countryInfo = `
                        <strong>Name:</strong> ${country.name.common} <br>
                        <strong>Capital:</strong> ${country.capital} <br>
                        <strong>Population:</strong> ${country.population} <br>
                        <strong>Currency:</strong> ${country.currencies ? Object.values(country.currencies)[0].name : 'N/A'} <br>
                        <strong>Languages:</strong> ${Object.values(country.languages).join(', ')} <br>
                        <strong>Flag:</strong> <img src="${country.flags.svg}" alt="Flag" width="50px">
                    `;
                    document.getElementById('country-info').innerHTML = countryInfo;
                })
                .catch(error => console.log('Error fetching country details:', error));
        }

        // Function to Fetch Geopolitical News using NewsData.io API
        function fetchGeopoliticalNews(countryName) {
            fetch(`https://newsdata.io/api/1/news?country=${countryName}&apikey=${apiKey}`)
                .then(response => response.json())
                .then(data => {
                    const news = data.results.slice(0, 1); // Fetch the latest geopolitical news
                    const newsContent = news.map(item => `
                        <p><strong>${item.title}</strong>: ${item.description}</p>
                    `).join('');
                    document.getElementById('geopolitical-news').innerHTML = newsContent;
                })
                .catch(error => console.log('Error fetching news:', error));
        }

        // Function to Toggle Between Country Details and Geopolitical News Tabs
        function showTab(tabIndex) {
            const tab1 = document.getElementById('tab-1');
            const tab2 = document.getElementById('tab-2');
            const buttons = document.querySelectorAll('.tab-button');

            // Hide both tabs
            tab1.classList.remove('active');
            tab2.classList.remove('active');

            // Show the selected tab
            if (tabIndex === 1) {
                tab1.classList.add('active');
            } else {
                tab2.classList.add('active');
            }

            // Highlight active tab button
            buttons.forEach((button, index) => {
                if (index === tabIndex - 1) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        // Initialize Map and Load Content on Page Load
        window.onload = function() {
            initMap(); // Initialize the map
            showTab(1); // Default tab is "Country Details"
        };
    </script>

    <!-- Leaflet JS for Map Functionality -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</body>
</html>
