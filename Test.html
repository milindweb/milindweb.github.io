<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
/* ====== FORM CONTAINER ====== */
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

.contact-form {
  max-width: 500px;
  margin: 50px auto;
  padding: 25px;
  border-radius: 16px;
  background: #ffffff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* ====== INPUTS ====== */
.form-group {
  margin-bottom: 15px;
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  transition: 0.3s;
  font-size: 14px;
}

.contact-form input:focus,
.contact-form textarea:focus {
  border-color: #007bff;
  outline: none;
}

/* ====== BUTTON ====== */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #007bff;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0056b3;
}

/* ====== STATUS ====== */
#formStatus {
  margin-top: 12px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
}
</style>
</head>

<body>

<form id="contactForm" class="contact-form">

  <h2 style="text-align:center;margin-bottom:20px;">Contact Us</h2>

  <div class="form-group">
    <input type="text" name="name" placeholder="Your Name" required>
  </div>

  <div class="form-group">
    <input type="email" name="email" placeholder="Your Email" required>
  </div>

  <div class="form-group">
    <input type="text" name="subject" placeholder="Subject" required>
  </div>

  <div class="form-group">
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
  </div>

  <!-- Web3Forms Hidden Fields -->
  <input type="hidden" name="access_key" value="b85bd332-4aec-4a7f-9852-c092d282d461">
  <input type="hidden" name="from_name" value="Your Website">
  <input type="checkbox" name="botcheck" style="display:none;">

  <button type="submit" id="submitBtn">Send Message</button>

  <p id="formStatus"></p>

</form>

<script>
const form = document.getElementById('contactForm');
const submitBtn = document.getElementById('submitBtn');
const status = document.getElementById('formStatus');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(form);

    submitBtn.innerText = "Sending...";
    submitBtn.disabled = true;
    status.innerText = "";

    try {
        const response = await fetch("https://api.web3forms.com/submit", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            status.style.color = "green";
            status.innerText = "✅ Message sent successfully!";
            form.reset();
        } else {
            status.style.color = "red";
            status.innerText = "❌ " + data.message;
        }

    } catch (error) {
        status.style.color = "red";
        status.innerText = "❌ Network error. Try again.";
    }

    submitBtn.innerText = "Send Message";
    submitBtn.disabled = false;
});
</script>

</body>
</html>
