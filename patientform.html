<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Management Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Header & Footer CSS -->
  <link rel="stylesheet" href="css/headerfooter.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f6f8fb;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1100px;
      background: #fff;
      margin: 20px auto;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    h2 {
      background: #007bff;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 16px;
      margin-top: 20px;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .form-row label {
      flex: 1 1 150px;
      min-width: 120px;
      font-weight: 500;
    }

    .form-row input, .form-row select, .form-row textarea {
      flex: 1 1 200px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      min-height: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 5px;
      font-size: 13px;
      text-align: left;
    }

    th {
      background: #e9f1ff;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 8px;
    }

    button:hover {
      background: #0056b3;
    }

    .btn-small {
      padding: 4px 8px;
      font-size: 12px;
    }

    .total-box {
      text-align: right;
      font-weight: bold;
      margin-top: 10px;
    }

    .actions {
      text-align: center;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .form-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header"></div>

  <div class="container">
    <form id="patientForm">

      <h2>Basic Information</h2>
      <div class="form-row">
        <label>Mobile No</label>
        <input type="tel" id="mobile" required pattern="^[6-9][0-9]{9}$">
        <label>Patient Name</label>
        <input type="text" id="patientName" required>
        <label>Gender</label>
        <select id="gender" required>
          <option value="">Select</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
        <label>Age</label>
        <input type="number" id="age" min="0" max="99">
      </div>

      <div class="form-row">
        <label>Department</label>
        <input list="deptList" id="department" required>
        <datalist id="deptList"></datalist>
        <label>Doctor Name</label>
        <input list="drList" id="doctorName" required>
        <datalist id="drList"></datalist>
      </div>

      <h2>Clinical Information</h2>
      <div class="form-row">
        <label>Chief Complaint</label>
        <input list="chiefList" id="chiefComplaint">
        <datalist id="chiefList"></datalist>
        <label>Sub-Symptoms</label>
        <input list="subList" id="subSymptoms">
        <datalist id="subList"></datalist>
        <label>Specific Complaint</label>
        <input type="text" id="specificComplaint">
      </div>

      <h2>Vitals</h2>
      <div class="form-row">
        <label>Weight</label><input type="number" id="weight">
        <label>BP</label><input type="text" id="bp" placeholder="120/80">
        <label>Pulse</label><input type="number" id="pulse">
        <label>Temp</label><input type="number" id="temp">
        <label>Sugar</label><input type="number" id="sugar">
      </div>

      <h2>Investigations</h2>
      <table id="investTable">
        <thead>
          <tr>
            <th>Category</th><th>Test Name</th><th>Normal Range</th><th>Report</th><th>Remark</th><th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button type="button" id="addInv">+ Add Investigation</button>

      <h2>Prescriptions</h2>
      <table id="presTable">
        <thead>
          <tr><th>Form</th><th>Prescription</th><th>Note</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <button type="button" id="addPres">+ Add Prescription</button>

      <h2>Billing</h2>
      <table id="billTable">
        <thead>
          <tr>
            <th>Description</th><th>Rate</th><th>Qty</th><th>Discount</th><th>Amount</th><th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button type="button" id="addBill">+ Add Item</button>
      <div class="total-box">Total: ₹<span id="totalAmount">0</span></div>

      <h2>Doctor Notes</h2>
      <div class="form-row">
        <label>Diagnosis</label><input id="diagnosis">
        <label>Advice</label><input id="advice">
        <label>Effect After Treatment</label>
        <select id="effect">
          <option>NA</option>
          <option>Improved</option>
          <option>No Change</option>
          <option>Worse</option>
        </select>
        <label>Dr Note</label><input id="drNote">
      </div>

      <div class="actions">
        <button type="button" id="previewBtn">PREVIEW</button>
        <button type="submit">SUBMIT</button>
      </div>

      <div id="response"></div>
    </form>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="js/headerfooter.js" defer></script>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbw5Fq8xJeXjPilVb01Iz4lArtrgfq5jd8A55U8Zjp3taVRkni20QrXgHiYa1eEUN1ly/exec";

    // Load JSON lists for datalists
    async function loadData() {
      const files = {
        deptList: "data/dept.json",
        drList: "data/drname.json",
        chiefList: "data/compliant.json"
      };
      for (let [id, url] of Object.entries(files)) {
        const list = document.getElementById(id);
        const res = await fetch(url);
        const data = await res.json();

        if (id === "deptList") data.forEach(d => list.innerHTML += `<option value="${d.department}">`);
        if (id === "drList") data.doctors.forEach(n => list.innerHTML += `<option value="${n}">`);
        if (id === "chiefList") list.innerHTML += `<option value="${data.chiefComplaint}">`;
      }
    }

    loadData();

    // Add dynamic rows
    const invTbody = document.querySelector("#investTable tbody");
    const presTbody = document.querySelector("#presTable tbody");
    const billTbody = document.querySelector("#billTable tbody");

    document.getElementById("addInv").onclick = () => addRow(invTbody, 5);
    document.getElementById("addPres").onclick = () => addRow(presTbody, 3);
    document.getElementById("addBill").onclick = () => addRow(billTbody, 5);

    function addRow(tbody, cols) {
      if (tbody.rows.length >= 20) return alert("Maximum 20 rows allowed");
      const row = tbody.insertRow();
      for (let i = 0; i < cols - 1; i++) {
        const cell = row.insertCell();
        const inp = document.createElement("input");
        inp.type = "text";
        cell.appendChild(inp);
      }
      const delCell = row.insertCell();
      const btn = document.createElement("button");
      btn.innerText = "🗑";
      btn.type = "button";
      btn.className = "btn-small";
      btn.onclick = () => row.remove();
      delCell.appendChild(btn);
    }

    // Auto calc billing
    billTbody.addEventListener("input", calcTotal);
    function calcTotal() {
      let total = 0;
      [...billTbody.rows].forEach(r => {
        const rate = parseFloat(r.cells[1].querySelector("input").value) || 0;
        const qty = parseFloat(r.cells[2].querySelector("input").value) || 1;
        const disc = parseFloat(r.cells[3].querySelector("input").value) || 0;
        const amt = rate * qty - disc;
        r.cells[4].querySelector("input").value = amt.toFixed(2);
        total += amt;
      });
      document.getElementById("totalAmount").innerText = total.toFixed(2);
    }

    // Preview Button
    document.getElementById("previewBtn").onclick = () => {
      localStorage.setItem("patientData", JSON.stringify(getFormData()));
      window.open("patientpreview.html", "_blank");
    };

    // Submit
    document.getElementById("patientForm").onsubmit = (e) => {
      e.preventDefault();
      const data = getFormData();
      fetch(scriptURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(() => {
        document.getElementById("response").innerHTML = "<div style='color:green;'>✅ Saved Successfully</div>";
        e.target.reset();
      })
      .catch(() => {
        document.getElementById("response").innerHTML = "<div style='color:red;'>❌ Error saving data</div>";
      });
    };

    function getFormData() {
      return {
        mobile: mobile.value,
        patientName: patientName.value,
        gender: gender.value,
        age: age.value,
        department: department.value,
        doctorName: doctorName.value,
        chiefComplaint: chiefComplaint.value,
        subSymptoms: subSymptoms.value.split(","),
        specificComplaint: specificComplaint.value,
        weight: weight.value,
        bp: bp.value,
        pulse: pulse.value,
        temp: temp.value,
        sugar: sugar.value,
        investigations: [...invTbody.rows].map(r => ({
          category: r.cells[0].querySelector("input").value,
          testName: r.cells[1].querySelector("input").value,
          normalRange: r.cells[2].querySelector("input").value,
          reports: r.cells[3].querySelector("input").value,
          remark: r.cells[4].querySelector("input").value
        })),
        prescriptions: [...presTbody.rows].map(r => ({
          formAvailable: r.cells[0].querySelector("input").value,
          prescription: r.cells[1].querySelector("input").value,
          treatmentNote: r.cells[2].querySelector("input").value
        })),
        billing: [...billTbody.rows].map(r => ({
          description: r.cells[0].querySelector("input").value,
          rate: r.cells[1].querySelector("input").value,
          quantity: r.cells[2].querySelector("input").value,
          discount: r.cells[3].querySelector("input").value,
          amount: r.cells[4].querySelector("input").value
        })),
        diagnosis: diagnosis.value,
        advice: advice.value,
        effectAfterTreatment: effect.value,
        doctorNote: drNote.value
      };
    }
  </script>
</body>
</html>
