<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patient Registration Form</title>

  <style>
    :root{
      --bg:#0b1727;
      --card:#0f213a;
      --muted:#6b87a8;
      --text:#e8f1ff;
      --accent:#4cc9f0;
      --ok:#27c498;
      --warn:#ffcc00;
      --err:#ff6b6b;
      --border:rgba(255,255,255,.08);
      --shadow:0 8px 30px rgba(0,0,0,.35);
      --radius:14px;
      --gap:10px;
    }
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:16px;}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }
    .titlebar{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .titlebar h1{font-size:1.1rem;margin:0;font-weight:650;}
    .badges{margin-left:auto;display:flex;gap:8px;align-items:center}
    .badge{
      font-size:.75rem;padding:4px 8px;border-radius:999px;
      border:1px solid var(--border);color:var(--muted);
      background:rgba(255,255,255,.03);
    }
    .badge.offline{display:none;background:#2e3440;color:#ffdd88}
    form{display:flex;flex-direction:column;gap:14px;}
    .grid{display:flex;flex-wrap:wrap;gap:var(--gap);}
    .col{
      flex:1 1 260px;min-width:240px;
      display:flex;flex-direction:column;gap:6px;
      background:rgba(255,255,255,.02);
      border:1px solid var(--border);border-radius:12px;padding:10px;
    }
    label{font-size:.82rem;color:var(--muted)}
    .req::after{content:" *";color:#f39c12}
    input,select,textarea{
      width:100%;border-radius:10px;border:1px solid var(--border);
      background:rgba(255,255,255,.03);color:var(--text);
      padding:10px 12px;font-size:.95rem;outline:none;
    }
    textarea{min-height:74px;resize:vertical}
    .btn{
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px 12px;
      cursor:pointer;
      color:var(--text);
      background:rgba(255,255,255,.06);
      transition:.2s;
    }
    .btn.primary{background:linear-gradient(180deg,#3caef0,#248ac7);border-color:transparent;}
    .btn.warn{background:#3a2a00;border-color:#5b4300;color:#ffd98a;}
    .btn.ghost{background:transparent;}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
    .help{font-size:.8rem;color:var(--muted)}
    .overlay{
      position:fixed;inset:0;display:none;place-items:center;
      background:rgba(0,0,0,.45);z-index:50;
    }
    .spinner{
      width:54px;height:54px;border-radius:50%;
      border:5px solid rgba(255,255,255,.15);
      border-top-color:var(--accent);animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .toasts{
      position:fixed;right:12px;bottom:12px;
      display:flex;flex-direction:column;gap:8px;z-index:60;
    }
    .toast{
      background:#0e1c31;color:var(--text);
      border:1px solid var(--border);
      padding:10px 12px;border-radius:12px;
      box-shadow:var(--shadow);
      min-width:220px;max-width:min(92vw,420px);
      font-size:.92rem;
    }
    .toast.ok{border-color:rgba(39,196,152,.45)}
    .toast.warn{border-color:rgba(255,204,0,.45)}
    .toast.error{border-color:rgba(255,107,107,.45)}
    .toast small{display:block;color:var(--muted);margin-top:4px}
    @media (max-width:540px){.col{min-width:100%}}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="titlebar">
        <h1>OPD Patient Registration</h1>
        <div class="badges">
          <span class="badge" id="baseUrlBadge"></span>
          <span class="badge offline" id="offlineBadge">Offline</span>
        </div>
      </div>

      <form id="patientForm" novalidate autocomplete="on">
        <div class="grid">
          <div class="col" data-key="Patient Name">
            <label class="req">Patient Name</label>
            <input id="patientName" required placeholder="Full name" />
          </div>
          <div class="col" data-key="Mobile No.">
            <label class="req">Mobile No.</label>
            <input id="mobile" type="tel" required placeholder="9876543210" />
          </div>
          <div class="col" data-key="Gender">
            <label class="req">Gender</label>
            <select id="gender" required>
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
          <div class="col" data-key="Age">
            <label class="req">Age</label>
            <input id="age" type="number" required min="0" placeholder="Years" />
          </div>
          <div class="col" data-key="Doctor Name">
            <label class="req">Doctor</label>
            <input id="doctor" list="doctorList" required placeholder="Dr. Name" />
            <datalist id="doctorList">
              <option>Dr. ABC</option>
              <option>Dr. XYZ</option>
            </datalist>
          </div>
          <div class="col" data-key="Department">
            <label class="req">Department</label>
            <input id="department" list="deptList" required placeholder="Select" />
            <datalist id="deptList"></datalist>
          </div>
        </div>

        <div class="grid">
          <div class="col" data-key="Symptoms">
            <label>Symptoms</label>
            <textarea id="symptoms"></textarea>
          </div>
          <div class="col" data-key="BP"><label>BP</label><input id="bp" /></div>
          <div class="col" data-key="Pulse"><label>Pulse</label><input id="pulse" type="number" /></div>
          <div class="col" data-key="Temp"><label>Temp</label><input id="temp" type="number" /></div>
        </div>

        <div class="grid">
          <div class="col" data-key="Diagnosis">
            <label>Diagnosis</label><input id="diagnosis" />
          </div>
          <div class="col" data-key="Prescription (Generic API Brand Name)">
            <label>Prescription</label><textarea id="prescription"></textarea>
          </div>
          <div class="col" data-key="Advice">
            <label>Advice</label><textarea id="advice"></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn primary" id="btnSubmit">
            <span id="submitText">Submit</span>
            <span id="submitWait" style="display:none">Submitting...</span>
          </button>
          <a href="patientpreview.html" target="_blank" class="btn ghost">Preview</a>
          <button type="button" class="btn warn" id="btnSaveLocal">Save Offline</button>
          <button type="reset" class="btn ghost">Clear</button>
        </div>
        <div class="help">Works offline. Queued submissions sync automatically.</div>
      </form>
    </div>
  </div>

  <div class="overlay" id="overlay"><div class="spinner"></div></div>
  <div class="toasts" id="toasts"></div>

  <script>
    // ------------------ CONFIG ------------------
    window.APP_CONFIG = {
      BASE_URL: "https://script.google.com/macros/s/AKfycbyfWMwKwuEsztaCTuQaL4tLda2u7Zl974RBngPqyYxjahdoWPCVsX_iDU5dV7eKNGtk/exec",
      ENDPOINTS: {
        HEADERS: "meta/headers",
        DEPARTMENTS: "meta/departments",
        GENERATE_OPD: "meta/opd",
        RECORDS: "records"
      },
      STORAGE_KEYS: {
        RECENTS: "pm_recent_values",
        RECORD_CACHE: "pm_record_cache",
        QUEUE: "pm_offline_queue"
      }
    };

    document.addEventListener("DOMContentLoaded", () => {
      const b = document.getElementById("baseUrlBadge");
      if (b) b.textContent = new URL(APP_CONFIG.BASE_URL).host;
      updateOfflineBadge();
    });

    function updateOfflineBadge() {
      const badge = document.getElementById("offlineBadge");
      if (!badge) return;
      badge.style.display = navigator.onLine ? "none" : "inline-flex";
    }
    window.addEventListener("online", updateOfflineBadge);
    window.addEventListener("offline", updateOfflineBadge);

    window.showOverlay = () => { document.getElementById("overlay").style.display = "grid"; };
    window.hideOverlay = () => { document.getElementById("overlay").style.display = "none"; };

    window.toast = (msg, type = "ok", sub = "") => {
      const box = document.getElementById("toasts");
      if (!box) return;
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.innerHTML = `${msg}${sub ? `<small>${sub}</small>` : ""}`;
      box.appendChild(el);
      setTimeout(() => el.remove(), 5200);
    };
  </script>

  <!-- JS main logic -->
  <script type="module" src="js/patientform.js"></script>
</body>
</html>
